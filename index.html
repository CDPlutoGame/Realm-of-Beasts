<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CDPluto RPG</title>
    <style>
        body { 
            background: #000 url('images/dungeon.png') no-repeat center center fixed; 
            background-size: cover;
            color: #fff; 
            font-family: sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 10px; 
            padding-bottom: 200px; 
        }

        /* Panels leicht transparent schwarz, damit sie auf dem Hintergrund lesbar sind */
        #statusPanel { 
            background: rgba(17, 17, 17, 0.85); 
            border: 1px solid gold; 
            border-radius: 10px; 
            padding: 10px; 
            margin-bottom: 5px; 
            font-size: 13px; 
        }
        
        #musicControl { 
            background: rgba(17, 17, 17, 0.85); 
            border: 1px solid #444; 
            border-radius: 10px; 
            padding: 5px; 
            margin-bottom: 10px; 
            font-size: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
        }
        #volumeSlider { cursor: pointer; accent-color: red; }

        #battle-arena { 
            height: 130px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 15px; 
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #222; 
            border-radius: 10px; 
        }

        #board { 
            display: block; 
            max-width: 360px; 
            margin: 0 auto; 
            line-height: 0; 
            background: rgba(0, 0, 0, 0.4);
            padding: 5px;
            border-radius: 10px;
        }
        
        .cell { 
            width: 34px; 
            height: 34px; 
            background: rgba(34, 34, 34, 0.8); 
            display: inline-block; 
            margin: 2px; 
            line-height: 34px; 
            text-align: center; 
            border-radius: 5px; 
            font-size: 20px; 
        }

        #schwarzmarkt { 
            margin-top: 20px; 
            padding: 10px; 
            background: rgba(10, 10, 10, 0.9); 
            border: 1px solid #333; 
            border-radius: 10px; 
        }

        #controls { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: rgba(0,0,0,0.9); 
            padding: 15px; 
            box-sizing: border-box; 
            border-top: 2px solid #444; 
        }

        .main-btn { width: 100%; padding: 20px; border-radius: 10px; font-size: 20px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .buy-btn { padding: 8px; border-radius: 5px; margin: 3px; font-size: 11px; border: none; font-weight: bold; cursor: pointer; }
        .buy-btn:disabled { background: #333 !important; color: #666 !important; cursor: not-allowed; }
        
        .login-glow {
            background: #ff0000 !important;
            box-shadow: 0 0 25px #ff0000, inset 0 0 10px #8b0000 !important;
            color: white !important;
            border: 2px solid #fff !important;
        }
    </style>
</head>
<body>

    <div id="statusPanel">Bitte einloggen...</div>

    <div id="musicControl">
        <span>🎵 Musik</span>
        <input type="range" id="volumeSlider" min="0" max="100" value="50" oninput="changeVolume(this.value)">
    </div>

    <div id="battle-arena">
        <div style="color: #ccc;">Warte auf Login...</div>
    </div>

    <div id="board"></div>

    <div id="schwarzmarkt"></div>

    <div id="controls">
        <button id="actionBtn" class="main-btn login-glow" onclick="startGame()">LOGIN</button>
        <div id="autoRunArea"></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
