<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realm of Beasts</title>

<style>
body {
    background: #000 url('images/dungeon.png') no-repeat center center fixed;
    background-size: cover;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 10px;
    padding-bottom: 200px;
}

#loginOverlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: flex;
    justify-content: center;
    align-items: center;
}

#loginBox {
    background: black;
    border: 3px solid red;
    padding: 30px;
    border-radius: 15px;
}

input {
    padding: 10px;
    font-size: 18px;
    margin-bottom: 15px;
}

button {
    padding: 15px;
    font-size: 18px;
    background: darkred;
    color: white;
    border: 2px solid red;
    cursor: pointer;
}

#statusPanel, #battle-arena, #board {
    margin: 10px auto;
    max-width: 400px;
    background: rgba(0,0,0,0.8);
    padding: 10px;
    border-radius: 10px;
}

#board {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 5px;
}

.cell {
    background: #300;
    padding: 15px 0;
    border-radius: 5px;
}
</style>
</head>

<body>

<div id="loginOverlay">
    <div id="loginBox">
        <h2>Realm Name</h2>
        <input type="text" id="playerNameInput" placeholder="Name eingeben">
        <br>
        <button onclick="startGame()">Betreten</button>
    </div>
</div>

<div id="statusPanel">Lade Welt...</div>
<div id="battle-arena">Warte auf Start...</div>
<div id="board"></div>

<button onclick="handleAction()">VORWÄRTS / ANGRIFF</button>

<script src="game.js"></script>
</body>
</html>
