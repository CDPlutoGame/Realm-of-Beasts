<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realm of Beasts</title>

<style>
body{
    margin:0;
    background:#000 url("images/dungeon.png") center/cover fixed;
    color:white;
    font-family:Arial;
    text-align:center;
}

#loginOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.95);
    display:flex;
    justify-content:center;
    align-items:center;
}

#loginBox{
    background:#111;
    border:3px solid red;
    padding:30px;
    border-radius:15px;
}

button{
    padding:12px;
    margin:5px;
    background:#800;
    color:white;
    border:2px solid red;
    cursor:pointer;
}

#statusPanel,#battlePanel,#log,#shop{
    max-width:420px;
    margin:10px auto;
    padding:10px;
    background:rgba(0,0,0,.8);
    border-radius:10px;
}

#battlePanel img{
    width:120px;
    height:auto;
}

#board{
    max-width:420px;
    margin:10px auto;
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:5px;
}

.cell{
    background:#300;
    padding:15px 0;
    border-radius:5px;
}

#log{
    height:120px;
    overflow-y:auto;
    text-align:left;
    font-size:14px;
}
</style>
</head>
<body>

<div id="loginOverlay">
    <div id="loginBox">
        <h2>Realm Name</h2>
        <input type="text" id="nameInput" placeholder="Name eingeben">
        <br>
        <button onclick="startGame()">Betreten</button>
    </div>
</div>

<div id="statusPanel"></div>

<div id="battlePanel">
    <h3>Ein dunkler Wald voller Gefahr...</h3>
    <p>Du spürst eine böse Präsenz.</p>
</div>

<div id="board"></div>
<button onclick="handleAction()">VORWÄRTS / ANGRIFF</button>
<div id="shop"></div>
<div id="log"></div>

<script src="game.js"></script>
</body>
    <div style="position:fixed;top:10px;left:10px;">
<input type="range" min="0" max="100" value="50" 
oninput="changeVolume(this.value)">
</div>
</html>
