<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CDPluto RPG - Realm</title>
    <style>
        body { 
            background: #000 url('images/dungeon.png') no-repeat center center fixed; 
            background-size: cover;
            color: #fff; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; margin: 0; padding: 10px; padding-bottom: 220px; overflow-x: hidden;
        }

        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); display: flex; justify-content: center; align-items: center; z-index: 9999;
        }

        #loginBox {
            background: #000; border: 3px solid #ff0000; border-radius: 20px;
            box-shadow: 0 0 40px #ff0000, inset 0 0 20px #ff0000;
            padding: 40px 20px; width: 85%; max-width: 400px;
        }

        .realm-title {
            color: #ff0000; font-size: 32px; font-weight: bold; text-transform: uppercase;
            margin-bottom: 25px; letter-spacing: 5px; text-shadow: 0 0 20px #ff0000;
        }

        #playerNameInput {
            width: 85%; padding: 15px; background: #111; border: 2px solid #ff0000;
            color: #fff; text-align: center; font-size: 20px; border-radius: 10px;
            margin-bottom: 25px; outline: none; box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        #statusPanel { 
            background: rgba(0, 0, 0, 0.85); border: 2px solid #ff0000; border-radius: 12px; 
            padding: 12px; margin-bottom: 10px; box-shadow: 0 0 15px #ff0000;
        }

        #musicControl { background: rgba(0, 0, 0, 0.8); border: 1px solid #444; border-radius: 10px; padding: 8px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        #volumeSlider { cursor: pointer; accent-color: #ff0000; width: 100px; }

        #battle-arena { height: 130px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 15px; background: rgba(0, 0, 0, 0.7); border: 1px solid #333; border-radius: 10px; }
        #board { max-width: 360px; margin: 0 auto; background: rgba(0, 0, 0, 0.6); padding: 8px; border-radius: 12px; line-height: 0; border: 1px solid #500; }
        .cell { width: 34px; height: 34px; background: rgba(40, 0, 0, 0.4); display: inline-block; margin: 2px; line-height: 34px; text-align: center; border-radius: 5px; font-size: 18px; border: 1px solid #400; }

        #schwarzmarkt { margin-top: 20px; padding: 15px; background: rgba(10, 10, 10, 0.95); border: 1px solid #ff0000; border-radius: 12px; box-shadow: 0 0 10px #ff0000; }
        
        #controls { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.95); padding: 15px; box-sizing: border-box; border-top: 3px solid #ff0000; z-index: 500; }
        
        .main-btn { 
            width: 100%; padding: 18px; border-radius: 12px; font-size: 22px; font-weight: bold; 
            text-transform: uppercase; cursor: pointer; border: 2px solid #ff0000; 
            background: #800; color: white; text-shadow: 0 0 10px #ff0000; box-shadow: 0 0 20px #ff0000;
        }

        .buy-btn { padding: 8px; border-radius: 5px; margin: 3px; font-size: 11px; border: 1px solid #ff0000; font-weight: bold; cursor: pointer; background: #222; color: white; }
        .buy-btn:disabled { background: #111 !important; color: #444 !important; border-color: #333 !important; }
    </style>
</head>
<body>
    <div id="loginOverlay">
        <div id="loginBox">
            <div class="realm-title">Realm Name</div>
            <input type="text" id="playerNameInput" placeholder="NAME DES HELDEN..." maxlength="12">
            <button class="main-btn" onclick="startGame()">BETRETEN</button>
        </div>
    </div>

    <div id="statusPanel">Lade Welt...</div>
    <div id="musicControl"><span>🎵</span> <input type="range" id="volumeSlider" min="0" max="100" value="50" oninput="changeVolume(this.value)"></div>
    <div id="battle-arena"></div>
    <div id="board"></div>
    <div id="schwarzmarkt"></div>

    <div id="controls">
        <button id="actionBtn" class="main-btn">LADEN...</button>
        <div id="autoRunArea"></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
