<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDPluto RPG</title>
    <style>
        /* Grunddesign */
        body { 
            background-color: #000; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        /* Der Haupt-Action-Button (Spiel Laden / Laufen / Angriff) */
        #mainActionBtn { 
            width: 100%; 
            max-width: 400px; 
            padding: 18px; 
            font-size: 20px; 
            font-weight: bold; 
            border-radius: 12px; 
            border: 2px solid gold; 
            cursor: pointer; 
            text-transform: uppercase;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Status Panel */
        #statusPanel { 
            width: 100%; 
            max-width: 400px; 
            margin-bottom: 15px; 
        }

        /* Kampf-Fenster */
        #battle-arena { 
            width: 100%; 
            max-width: 400px; 
            height: 140px; 
            background: #1a1a1a; 
            border: 1px solid #333; 
            border-radius: 15px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            margin-bottom: 15px; 
        }

        /* Das Spielfeld (Brett) */
        #board { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 4px; 
            width: 100%; 
            max-width: 380px; 
            background: #111; 
            padding: 8px; 
            border-radius: 10px; 
            border: 1px solid #222;
        }

        .cell { 
            background: #252525; 
            height: 45px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 22px; 
            border-radius: 5px; 
        }

        /* Autorun Bereich */
        #fightPanel { 
            width: 100%; 
            max-width: 400px; 
            margin-top: 15px; 
        }

        /* Schwarzmarkt */
        #schwarzmarkt { 
            width: 100%; 
            max-width: 400px; 
            margin-top: 25px; 
            padding: 15px; 
            border: 2px solid #333; 
            border-radius: 15px; 
            background: #0a0a0a;
        }

        /* Log Content */
        #logContent { 
            font-size: 11px; 
            color: #777; 
            margin-top: 15px; 
            text-align: left; 
            width: 100%; 
            max-width: 400px;
        }
    </style>
</head>
<body>

    <button id="mainActionBtn" onclick="startGame()" style="background: #4285f4; color: white;">
        SPIEL LADEN
    </button>

    <div id="statusPanel"></div>

    <div id="battle-arena">
        <div style="color: #444; font-weight: bold;">BEREIT MACHEN...</div>
    </div>

    <div id="board">
        </div>

    <div id="fightPanel">
        </div>

    <div id="schwarzmarkt">
        </div>

    <div id="logContent"></div>

    <script src="game.js"></script>

</body>
</html>
