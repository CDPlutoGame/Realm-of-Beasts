<html lang="de">

    <title>CDPluto RPG - Realm</title>

        body { 
            background: #000 url('images/dungeon.png') no-repeat center center fixed;

            text-align: center; 
            margin: 0; 
            padding: 10px; 
            padding-bottom: 220px; 
            overflow-x: hidden;

        /* EPIC LOGIN OVERLAY */
        #loginOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* Ganz nach oben */
        }

        #loginBox {
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            border: 3px solid #d4af37;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.6);
            padding: 40px 20px;
            border-radius: 20px;
            width: 85%;
            max-width: 400px;
            pointer-events: all; /* Klicks erlauben */
        }

        .realm-title {
            color: #d4af37;
            font-size: 28px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.8);
        }

        .realm-subtitle {
            color: #888;
            font-size: 13px;
            margin-bottom: 25px;
            font-style: italic;
        }

        #playerNameInput {

            padding: 12px;
            background: #222;
            border: 2px solid #d4af37;
            color: #fff;
            text-align: center;
            font-size: 18px;
            border-radius: 8px;
            margin-bottom: 20px;
            outline: none;
            display: inline-block;
        }
